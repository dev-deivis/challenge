version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: mindshore_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mindshore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindshore_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mindshore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindshore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindshore_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mindshore}:${POSTGRES_PASSWORD:-mindshore_secret}@db:5432/${POSTGRES_DB:-mindshore}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mindshore_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ""
      BACKEND_URL: http://backend:3000
      VITE_NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
